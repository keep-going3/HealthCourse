server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fitness_db?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  sql:
    init:
      mode: never  # 生产环境不自动执行 SQL

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # 关闭 SQL 日志

jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

agent:
  base-url: ${AGENT_URL:http://localhost:8000}
  connect-timeout: 5000
  read-timeout: 25000
